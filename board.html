<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NewWay Foundry — Broker Platform</title>
<style>
  :root {
    --bg: #f5f7fa;
    --panel: #eef1f6;
    --card: #ffffff;
    --ink: #1b2533;
    --ink-soft: #5b6878;
    --ink-faint: #8794a6;
    --line: #dde3ec;
    --line-soft: #e7ecf3;
    --nwd: #305d94;
    --action: #3182ce;
    --orange: #ed8936;
    --green: #48bb78;
    --amber: #d69e2e;
    --red: #e53e3e;
    --slate: #64748b;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --sans: -apple-system, system-ui, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --col-w: 248px;
    --radius: 10px;
    --shadow: 0 1px 2px rgba(20,33,51,.06), 0 1px 1px rgba(20,33,51,.04);
  }
  * { box-sizing: border-box; }
  [hidden] { display: none !important; }
  html, body { height: 100%; }
  body {
    margin: 0; font-family: var(--sans); color: var(--ink); background: var(--bg);
    -webkit-font-smoothing: antialiased; display: flex; flex-direction: column;
  }

  /* ── Top bar ───────────────────────────────────────────── */
  header.bar {
    display: flex; align-items: center; gap: 18px; padding: 12px 20px;
    background: #fff; border-bottom: 1px solid var(--line); flex-wrap: wrap;
    position: sticky; top: 0; z-index: 20;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand .dot {
    width: 9px; height: 9px; border-radius: 50%; background: var(--green);
    box-shadow: 0 0 0 3px rgba(72,187,120,.18);
  }
  .brand h1 { font-size: 16px; font-weight: 650; letter-spacing: -.01em; margin: 0; }
  .brand .scope {
    font-size: 11px; font-weight: 600; letter-spacing: .02em;
    color: var(--nwd); background: #e7eef6; border-radius: 20px; padding: 3px 9px;
  }
  .brand .sub { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); }

  .controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-left: auto; }
  .controls input[type="search"], .controls select {
    font-family: var(--sans); font-size: 13px; color: var(--ink); background: #fff;
    border: 1px solid var(--line); border-radius: 8px; padding: 6px 10px; height: 32px;
  }
  .controls input[type="search"] { width: 180px; }
  .controls select { cursor: pointer; }
  .controls input:focus-visible, .controls select:focus-visible,
  button:focus-visible, .card:focus-visible {
    outline: 2px solid var(--action); outline-offset: 2px;
  }
  .toggle {
    display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink-soft);
    cursor: pointer; user-select: none; padding: 4px 6px; border-radius: 6px;
  }
  .toggle input { accent-color: var(--action); }
  button.ghost {
    font-family: var(--sans); font-size: 13px; font-weight: 550; color: var(--ink-soft); background: #fff;
    border: 1px solid var(--line); border-radius: 8px; height: 32px; padding: 0 13px; cursor: pointer;
  }
  button.ghost:hover { background: #f4f6fa; }
  button.submit {
    font-family: var(--sans); font-size: 13px; font-weight: 650; color: #fff; background: var(--nwd);
    border: 0; border-radius: 8px; height: 32px; padding: 0 16px; cursor: pointer;
  }
  button.submit:hover { background: #284f7e; }
  button:disabled { opacity: .55; cursor: default; }
  .stamp { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); white-space: nowrap; }

  /* ── Board ─────────────────────────────────────────────── */
  .scroll { flex: 1; overflow: auto; padding: 0 14px 18px; }
  .phase-row, .board { display: grid; grid-auto-flow: column; gap: 12px; }
  .phase-row { position: sticky; top: 0; z-index: 5; padding: 12px 0 6px; background: var(--bg); }
  .board { padding-bottom: 6px; align-items: start; grid-auto-columns: var(--col-w); }

  .phase {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; font-weight: 650; letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink-soft); padding: 4px 2px; border-top: 2px solid var(--phase-tint, var(--slate));
  }
  .phase .pcount { font-family: var(--mono); font-weight: 600; color: var(--ink-faint); letter-spacing: 0; }

  .col {
    width: var(--col-w); background: var(--panel); border: 1px solid var(--line-soft);
    border-radius: var(--radius); display: flex; flex-direction: column; max-height: 100%;
  }
  .col.empty { background: transparent; border-style: dashed; border-color: var(--line); }
  .col-head {
    display: flex; align-items: center; gap: 8px; padding: 9px 11px;
    border-bottom: 1px solid var(--line-soft);
    position: sticky; top: 0; background: inherit; border-radius: var(--radius) var(--radius) 0 0;
  }
  .col.empty .col-head { border-bottom-color: transparent; }
  .col-head .name { font-size: 12.5px; font-weight: 600; color: var(--ink); letter-spacing: -.01em; }
  .col-head .count {
    font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--ink-soft);
    background: #fff; border: 1px solid var(--line); border-radius: 20px;
    min-width: 20px; height: 20px; padding: 0 6px;
    display: inline-flex; align-items: center; justify-content: center; margin-left: auto;
  }
  .col-body { padding: 8px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
  .col-empty-note { font-size: 11.5px; color: var(--ink-faint); padding: 10px 4px; text-align: center; }

  /* ── Card ──────────────────────────────────────────────── */
  .card {
    display: block; text-align: left; width: 100%; background: var(--card);
    border: 1px solid var(--line); border-left: 3px solid var(--spine, var(--slate));
    border-radius: 8px; padding: 9px 10px 10px; cursor: pointer; box-shadow: var(--shadow);
    font-family: var(--sans);
    transition: border-color .12s ease, transform .12s ease, box-shadow .12s ease;
  }
  .card:hover { border-color: var(--action); border-left-color: var(--spine, var(--slate)); transform: translateY(-1px); box-shadow: 0 4px 10px rgba(20,33,51,.10); }
  .card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .card-id { font-family: var(--mono); font-size: 10.5px; font-weight: 600; color: var(--ink-faint); letter-spacing: .02em; }
  .pri { margin-left: auto; font-family: var(--mono); font-size: 10.5px; font-weight: 600; color: var(--ink-soft); display: inline-flex; align-items: center; gap: 5px; }
  .pri .bar { width: 30px; height: 4px; border-radius: 3px; background: var(--line); overflow: hidden; }
  .pri .bar > i { display: block; height: 100%; background: var(--action); }
  .card-title { font-size: 13px; font-weight: 600; line-height: 1.3; color: var(--ink); margin: 0 0 5px; }
  .card-reason {
    font-size: 11.5px; line-height: 1.4; color: var(--ink-soft); margin: 0 0 8px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .badges { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
  .badge { font-size: 10px; font-weight: 600; letter-spacing: .01em; padding: 2px 7px; border-radius: 20px; white-space: nowrap; }
  .badge.source { background: #eef2f8; color: var(--ink-soft); }
  .pill { font-size: 10px; font-weight: 650; letter-spacing: .02em; text-transform: uppercase; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
  .pill.approved { background: rgba(72,187,120,.15); color: #277a4b; }
  .pill.declined { background: rgba(229,62,62,.13); color: #b23030; }
  .pill.hold { background: #e9edf3; color: var(--slate); }
  .pill.revise { background: rgba(214,158,46,.16); color: #9a6f12; }
  .pill.pending { background: #fff; color: var(--action); border: 1px solid rgba(49,130,206,.4); }

  .card-foot { display: flex; align-items: center; gap: 8px; margin-top: 9px; padding-top: 8px; border-top: 1px solid var(--line-soft); }
  .links { display: flex; gap: 8px; align-items: center; }
  .links a { color: var(--action); text-decoration: none; font-family: var(--mono); font-size: 10px; }
  .links a:hover { text-decoration: underline; }
  .chip { font-family: var(--mono); font-size: 10px; color: var(--ink-faint); display: inline-flex; align-items: center; gap: 3px; }
  .chip.warn { color: var(--amber); }
  .decide {
    margin-left: auto; font-family: var(--sans); font-size: 11px; font-weight: 600; color: var(--action);
    background: #fff; border: 1px solid rgba(49,130,206,.45); border-radius: 7px; padding: 4px 9px; cursor: pointer;
  }
  .decide:hover { background: #f0f6fd; }
  .promote { margin-left: auto; font-family: var(--sans); font-size: 11px; font-weight: 700; color: #fff; background: var(--green); border: 0; border-radius: 7px; padding: 5px 11px; cursor: pointer; }
  .promote:hover { background: #38a169; }
  .blocked-note { margin-top: 7px; font-size: 10.5px; color: #b23030; background: rgba(229,62,62,.07); border-radius: 6px; padding: 5px 7px; line-height: 1.35; }

  /* ── States ────────────────────────────────────────────── */
  .state { padding: 60px 20px; text-align: center; color: var(--ink-soft); }
  .state h2 { font-size: 15px; font-weight: 600; color: var(--ink); margin: 0 0 6px; }
  .state p { font-size: 13px; margin: 0; }
  .state.error h2 { color: var(--red); }
  .spinner { width: 22px; height: 22px; border: 2.5px solid var(--line); border-top-color: var(--action); border-radius: 50%; margin: 0 auto 14px; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Decision modal ────────────────────────────────────── */
  .overlay {
    position: fixed; inset: 0; background: rgba(20,33,51,.42); z-index: 50;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .modal {
    width: 100%; max-width: 440px; background: #fff; border-radius: 14px;
    box-shadow: 0 20px 50px rgba(20,33,51,.28); padding: 18px 20px 20px; font-family: var(--sans);
  }
  .modal-head { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .modal-head .m-id { font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--ink-faint); }
  .modal-head .m-close { margin-left: auto; border: 0; background: none; font-size: 22px; line-height: 1; color: var(--ink-faint); cursor: pointer; padding: 0 4px; }
  .modal h3 { font-size: 15px; font-weight: 650; margin: 2px 0 4px; letter-spacing: -.01em; }
  .modal .m-sub { font-size: 12.5px; color: var(--ink-soft); margin: 0 0 14px; line-height: 1.45; }
  .opt-list { display: flex; flex-direction: column; gap: 7px; }
  .opt {
    text-align: left; font-family: var(--sans); font-size: 13px; font-weight: 550; color: var(--ink);
    background: #fff; border: 1px solid var(--line); border-radius: 9px; padding: 10px 12px; cursor: pointer;
    display: flex; align-items: center; gap: 9px;
  }
  .opt:hover { border-color: var(--action); background: #f7fafe; }
  .opt .dotc { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .opt small { color: var(--ink-faint); font-weight: 500; margin-left: auto; }
  .m-warn { font-size: 12px; line-height: 1.5; border-radius: 9px; padding: 10px 12px; margin: 0 0 12px; }
  .m-warn.amber { background: rgba(214,158,46,.12); color: #835c0d; }
  .m-warn.red { background: rgba(229,62,62,.1); color: #a52a2a; }
  .m-warn.blue { background: rgba(49,130,206,.1); color: #245a8a; }
  .m-warn strong { font-weight: 700; }
  textarea.m-feedback {
    width: 100%; min-height: 76px; resize: vertical; font-family: var(--sans); font-size: 13px;
    color: var(--ink); border: 1px solid var(--line); border-radius: 9px; padding: 9px 11px; margin-bottom: 12px;
  }
  textarea.m-feedback:focus-visible { outline: 2px solid var(--action); outline-offset: 1px; }
  .m-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .btn { font-family: var(--sans); font-size: 13px; font-weight: 600; border-radius: 9px; padding: 9px 16px; cursor: pointer; border: 1px solid var(--line); background: #fff; color: var(--ink-soft); }
  .btn:hover { background: #f4f6fa; }
  .btn.primary { border: 0; color: #fff; background: var(--nwd); }
  .btn.primary:hover { background: #284f7e; }
  .btn.primary.danger { background: var(--red); }
  .btn.primary.danger:hover { background: #c53030; }
  .btn.primary.go { background: var(--green); }
  .btn.primary.go:hover { background: #38a169; }
  .btn:disabled { opacity: .5; cursor: default; }
  .m-err { font-size: 12px; color: var(--red); margin: 10px 0 0; min-height: 1px; }
  .res-line { font-family: var(--mono); font-size: 12px; color: var(--ink); background: #f7f9fc; border: 1px solid var(--line-soft); border-radius: 7px; padding: 7px 10px; }
  .res-pre { font-family: var(--mono); font-size: 11.5px; color: var(--ink); background: #f7f9fc; border: 1px solid var(--line-soft); border-radius: 9px; padding: 10px 12px; max-height: 240px; overflow: auto; white-space: pre-wrap; margin: 0 0 12px; }
  .new-idea-btn { font-family: var(--sans); font-size: 13px; font-weight: 600; color: var(--nwd); background: #fff; border: 1px solid rgba(48,93,148,.4); border-radius: 8px; height: 32px; padding: 0 13px; cursor: pointer; }
  .new-idea-btn:hover { background: #eef3f9; }
  .field { margin-bottom: 12px; }
  .field > label { display: block; font-size: 10.5px; font-weight: 650; letter-spacing: .04em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 4px; }
  .field input, .field select, .field textarea { width: 100%; font-family: var(--sans); font-size: 13px; color: var(--ink); border: 1px solid var(--line); border-radius: 9px; padding: 8px 11px; }
  .field textarea { min-height: 130px; resize: vertical; }
  .field input:focus-visible, .field select:focus-visible, .field textarea:focus-visible { outline: 2px solid var(--action); outline-offset: 1px; }
  .field.row2 { display: flex; gap: 10px; }
  .field.row2 > div { flex: 1; }
  .preview { font-size: 12px; line-height: 1.45; color: var(--ink-soft); background: #f7f9fc; border: 1px solid var(--line-soft); border-radius: 9px; padding: 10px 12px; max-height: 150px; overflow: auto; margin-bottom: 12px; white-space: pre-wrap; }
  .baked-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; margin-bottom: 12px; }
  .baked-badge.yes { background: rgba(72,187,120,.15); color: #277a4b; }
  .baked-badge.no { background: #eef2f8; color: var(--ink-soft); }

  .toast {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: #fff; font-size: 13px; font-weight: 550;
    padding: 10px 16px; border-radius: 10px; box-shadow: 0 8px 24px rgba(20,33,51,.3);
    z-index: 60; opacity: 0; transition: opacity .2s ease;
  }
  .toast.show { opacity: 1; }

  @media (prefers-reduced-motion: reduce) { .spinner { animation: none; } .card, .toast { transition: none; } }
  @media (max-width: 640px) { .controls input[type="search"] { width: 130px; } .stamp { width: 100%; } }
</style>
</head>
<body>
  <header class="bar">
    <div class="brand">
      <span class="dot" title="Live queue"></span>
      <h1>NewWay Foundry</h1>
      <span class="scope">Broker Platform</span>
      <span class="sub" id="totalCount">—</span>
    </div>
    <div class="controls">
      <button class="new-idea-btn" id="newIdea">+ New idea</button>
      <input type="search" id="search" placeholder="Search title or reasoning…" aria-label="Search ideas" />
      <select id="fSource" aria-label="Filter by source"><option value="">All sources</option></select>
      <label class="toggle"><input type="checkbox" id="hideEmpty" checked /> Hide empty</label>
      <label class="toggle"><input type="checkbox" id="showClosed" checked /> Show closed</label>
      <span class="stamp" id="stamp"></span>
      <button class="ghost" id="runDesign">Run design</button>
      <button class="ghost" id="refresh">Refresh</button>
      <button class="submit" id="submit" title="Run the watcher: process every decision you've made this session">Submit</button>
    </div>
  </header>

  <div class="scroll" id="scroll">
    <div class="state" id="loading"><div class="spinner"></div><p>Loading the Broker Platform queue…</p></div>
    <div class="phase-row" id="phaseRow" hidden></div>
    <div class="board" id="board" hidden></div>
  </div>

  <div class="overlay" id="overlay" hidden></div>
  <div class="toast" id="toast" hidden></div>

<script>
(function () {
  "use strict";

  var KEY = new URLSearchParams(location.search).get("key") || "";

  // ── Scope: this board shows Broker Platform ideas only. ──────────────
  // An idea is in scope if its Product names the vetting / broker product.
  // If a Broker idea is missing here, its Product cell likely uses a word this
  // pattern doesn't catch — widen SCOPE_MATCH (one line) and redeploy.
  var SCOPE_MATCH = /broker|vetting|carrier/i;
  function inScope(idea) { return SCOPE_MATCH.test(idea.product || ""); }

  var PHASES = [
    { name: "Intake", tint: "#64748b", stages: ["Captured", "Enriching"] },
    { name: "Design", tint: "#3182ce", stages: ["Designing", "In Review"] },
    { name: "Build",  tint: "#ed8936", stages: ["Approved", "Building", "Testing", "Preview Deployed"] },
    { name: "Ship",   tint: "#48bb78", stages: ["Ready to Promote", "Live", "Monitoring"] },
    { name: "Closed", tint: "#94a3b8", stages: ["Declined", "Blocked"] }
  ];
  var KNOWN = PHASES.reduce(function (a, p) { return a.concat(p.stages); }, []);

  // Which Review actions are offered, by Stage.
  // Approve only at In Review (the idea has been designed -> has a real Build Sequence).
  function reviewOptions(stage) {
    if (stage === "In Review") return ["Approved", "Hold", "Revise Design", "Revise Research", "Declined"];
    if (["Captured", "Enriching", "Designing", "Blocked"].indexOf(stage) >= 0) return ["Hold", "Declined"];
    return []; // Approved onward + Declined are watcher-owned -> read-only
  }

  var OPT_META = {
    "Approved":        { color: "#48bb78", note: "passes the build gate" },
    "Hold":            { color: "#94a3b8", note: "park, with a note" },
    "Revise Design":   { color: "#d69e2e", note: "back to Designing" },
    "Revise Research": { color: "#d69e2e", note: "back to Research" },
    "Declined":        { color: "#e53e3e", note: "terminal" }
  };

  var els = {
    board: document.getElementById("board"),
    phaseRow: document.getElementById("phaseRow"),
    loading: document.getElementById("loading"),
    search: document.getElementById("search"),
    fSource: document.getElementById("fSource"),
    hideEmpty: document.getElementById("hideEmpty"),
    showClosed: document.getElementById("showClosed"),
    refresh: document.getElementById("refresh"),
    stamp: document.getElementById("stamp"),
    total: document.getElementById("totalCount"),
    overlay: document.getElementById("overlay"),
    toast: document.getElementById("toast"),
    submit: document.getElementById("submit"),
    newIdea: document.getElementById("newIdea"),
    runDesign: document.getElementById("runDesign")
  };

  var ALL = [];

  function api(path) { return path + (KEY ? (path.indexOf("?") < 0 ? "?" : "&") + "key=" + encodeURIComponent(KEY) : ""); }
  function resolveLink(id) { return "resolve.html?id=" + encodeURIComponent(id) + (KEY ? "&key=" + encodeURIComponent(KEY) : ""); }

  function productSpine(p) {
    var s = (p || "").toLowerCase();
    if (s.indexOf("vetting") >= 0 || s.indexOf("broker") >= 0 || s.indexOf("carrier") >= 0) return "#305d94";
    return "#94a3b8";
  }
  function reviewPill(v) {
    var s = (v || "").toLowerCase();
    if (s.indexOf("approve") >= 0) return { cls: "approved", txt: "Approved" };
    if (s.indexOf("decline") >= 0) return { cls: "declined", txt: "Declined" };
    if (s.indexOf("revise") >= 0) return { cls: "revise", txt: v };
    if (s.indexOf("hold") >= 0) return { cls: "hold", txt: "Hold" };
    if (s === "") return null;
    return { cls: "pending", txt: v };
  }
  function el(tag, cls, text) { var n = document.createElement(tag); if (cls) n.className = cls; if (text != null) n.textContent = text; return n; }

  function buildCard(idea) {
    var card = el("div", "card");
    card.tabIndex = 0;
    card.setAttribute("role", "link");
    card.setAttribute("aria-label", "Open " + (idea.id || "idea") + " in the resolve view");
    card.style.setProperty("--spine", productSpine(idea.product));
    function open() { location.href = resolveLink(idea.id); }
    card.addEventListener("click", function (e) { if (e.target.closest(".no-nav")) return; open(); });
    card.addEventListener("keydown", function (e) { if ((e.key === "Enter" || e.key === " ") && !e.target.closest(".no-nav")) { e.preventDefault(); open(); } });

    var top = el("div", "card-top");
    top.appendChild(el("span", "card-id", idea.id || "—"));
    var pNum = parseInt(idea.priority, 10);
    if (!isNaN(pNum)) {
      var pri = el("span", "pri");
      pri.appendChild(el("span", null, String(pNum)));
      var bar = el("span", "bar"); var fill = document.createElement("i");
      fill.style.width = Math.max(0, Math.min(100, pNum)) + "%"; bar.appendChild(fill); pri.appendChild(bar);
      top.appendChild(pri);
    }
    card.appendChild(top);

    card.appendChild(el("p", "card-title", idea.title || "(untitled)"));
    if (idea.reasoning) card.appendChild(el("p", "card-reason", idea.reasoning));

    var badges = el("div", "badges");
    var rp = reviewPill(idea.review);
    if (rp) badges.appendChild(el("span", "pill " + rp.cls, rp.txt));
    if (idea.source) badges.appendChild(el("span", "badge source", idea.source));
    if (badges.childNodes.length) card.appendChild(badges);

    if (idea.blockedReason) card.appendChild(el("div", "blocked-note", "Blocked: " + idea.blockedReason));

    // Footer: links + Decide
    var foot = el("div", "card-foot");
    var links = el("div", "links");
    var revs = parseInt(idea.revisions, 10);
    if (!isNaN(revs) && revs > 0) links.appendChild(el("span", "chip warn", "\u21BB " + revs));
    if (idea.previewUrl) links.appendChild(extLink(idea.previewUrl, "Preview \u2197"));

    var opts = reviewOptions(idea.stage || "");

  }

  function extLink(href, label) {

  // ── Decision modal ───────────────────────────────────────────────────

  function escClose(e) { if (e.key === "Escape") closeModal(); }
  function shell(idea) {

    head.appendChild(x);
    modal.appendChild(head);
    els.overlay.appendChild(modal);

  function openMenu(idea, opts) {
    var m = shell(idea);

  function openDesignConfirm(idea) {

    var errLine = el("p", "m-err", ""); m.appendChild(errLine);
    var actions = el("div", "m-actions");
    var back = el("button", "btn", "Back"); back.addEventListener("click", function () { openMenu(idea, reviewOptions(idea.stage || "")); });
    actions.appendChild(back);

  function runDesign(id, go, errLine) {
    go.disabled = true; go.textContent = "Designing…"; errLine.textContent = "";
    fetch(api("/api/run-design?id=" + encodeURIComponent(id)), { method: "POST", headers: { "Content-Type": "application/json" }, body: "{}" })
      .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
      .then(function (res) {

      })

  }

  function openRunDesign() {
    var captured = ALL.filter(inScope).filter(function (i) { return (i.stage || "") === "Captured" && Number(i.priority) >= 60; });
    captured.sort(function (a, b) { return (Number(b.priority) || 0) - (Number(a.priority) || 0); });
    var top = captured[0];

    els.overlay.innerHTML = "";
    var modal = el("div", "modal");
    var head = el("div", "modal-head");
    head.appendChild(el("span", "m-id", "DESIGN"));

    head.appendChild(x); modal.appendChild(head);
    modal.appendChild(el("h3", null, "Run design"));
    modal.appendChild(el("p", "m-sub", top
      ? "Designs the highest-priority Captured idea: " + top.id + " — " + (top.title || "")
      : "No Captured idea over priority 60 is waiting. (To design a specific idea, use Decide → Send to Design on its card.)"));
    if (top) modal.appendChild(warn("blue", "Generates / refines its spec and moves it to In Review. Spends API credits. One idea per run."));
    var errLine = el("p", "m-err", ""); modal.appendChild(errLine);
    var actions = el("div", "m-actions");
    var cancel = el("button", "btn", "Cancel"); cancel.addEventListener("click", closeModal); actions.appendChild(cancel);
    if (top) {

    els.overlay.hidden = false;
    document.addEventListener("keydown", escClose);
    els.overlay.onclick = function (e) { if (e.target === els.overlay) closeModal(); };
  }

  function openConfirm(idea, choice) {
    var m = shell(idea);
    var isApprove = choice === "Approved";
    var isDecline = choice === "Declined";
    var isRevise = choice.indexOf("Revise") === 0;
    var isHold = choice === "Hold";

    m.appendChild(el("h3", null, choice + " " + idea.id + "?"));
    m.appendChild(el("p", "m-sub", idea.title || ""));

    if (isApprove) {
      var w = el("div", "m-warn blue");
      w.innerHTML = "<strong>This passes the build gate.</strong> On its next run the watcher fires a real autonomous build on the <strong>staging</strong> branch \u2014 it spends API credits and commits code. It does not promote to production; that stays a separate manual step.";
      m.appendChild(w);
      if (!idea.hasBuildSequence) {
        var nb = el("div", "m-warn amber");
        nb.innerHTML = "<strong>No Build Sequence yet.</strong> This idea hasn't been through the resolve view, so the build will likely produce \u201Cno changes\u201D (the IDEA-0012 trap). Consider resolving it first.";
        m.appendChild(nb);
      }
    } else if (isDecline) {
      m.appendChild(warn("red", "<strong>Declining is terminal.</strong> The idea stops here and the reason is logged. You can add one below."));
    } else if (isRevise) {
      var back = choice === "Revise Design" ? "Designing" : "Research";
      m.appendChild(warn("amber", "Sends " + idea.id + " back to <strong>" + back + "</strong>. Your feedback travels with it into the redo, so be specific about what should change."));
    } else if (isHold) {
      m.appendChild(warn("blue", "Parks " + idea.id + " with an optional note. Nothing else changes."));
    }

    var ta = null;
    if (isRevise || isDecline || isHold) {
      ta = document.createElement("textarea");
      ta.className = "m-feedback";
      ta.placeholder = isRevise ? "What should change? (required)" : "Optional note\u2026";
      m.appendChild(ta);
    }

    var errLine = el("p", "m-err", ""); m.appendChild(errLine);

    var actions = el("div", "m-actions");
    var back = el("button", "btn", "Back"); back.addEventListener("click", function () { openMenu(idea, reviewOptions(idea.stage || "")); });
    actions.appendChild(back);

    var primaryClass = "btn primary" + (isApprove ? " go" : isDecline ? " danger" : "");
    var label = isApprove ? "Approve & pass gate" : isDecline ? "Decline" : isRevise ? "Send back" : "Hold";
    var go = el("button", primaryClass, label);
    function syncEnabled() { if (isRevise) go.disabled = !(ta && ta.value.trim()); }
    if (ta) ta.addEventListener("input", syncEnabled);
    syncEnabled();
    go.addEventListener("click", function () {
      var fb = ta ? ta.value.trim() : "";
      if (isRevise && !fb) { errLine.textContent = "Add feedback so the redo has direction."; return; }
      submit(idea, choice, fb, go, errLine);
    });
    actions.appendChild(go);
    m.appendChild(actions);
  }

  function warn(kind, html) { var w = el("div", "m-warn " + kind); w.innerHTML = html; return w; }

  function submit(idea, review, feedback, btn, errLine) {
    btn.disabled = true; btn.textContent = "Saving\u2026"; errLine.textContent = "";
    fetch(api("/api/review"), {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id: idea.id, review: review, feedback: feedback })
    })
      .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
      .then(function (res) {
        if (!res.ok || !res.j || res.j.ok === false) throw new Error((res.j && res.j.error) || "Save failed");
        // reflect locally
        for (var i = 0; i < ALL.length; i++) { if (ALL[i].id === idea.id) { ALL[i].review = review; break; } }
        closeModal();
        render();
        showToast(idea.id + " \u2192 " + review + (review === "Approved" ? " \u00B7 watcher will build on next run" : ""));
      })
      .catch(function (e) { btn.disabled = false; btn.textContent = "Try again"; errLine.textContent = e.message; });
  }

  var toastTimer = null;
  function showToast(msg) {
    els.toast.textContent = msg; els.toast.hidden = false;
    requestAnimationFrame(function () { els.toast.classList.add("show"); });
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { els.toast.classList.remove("show"); setTimeout(function () { els.toast.hidden = true; }, 250); }, 3200);
  }

  // ── Filters + render ─────────────────────────────────────────────────
  function passesFilters(idea) {
    var q = els.search.value.trim().toLowerCase();
    if (q) { var hay = ((idea.title || "") + " " + (idea.reasoning || "") + " " + (idea.id || "")).toLowerCase(); if (hay.indexOf(q) < 0) return false; }
    if (els.fSource.value && idea.source !== els.fSource.value) return false;
    return true;
  }

  function render() {
    var hideEmpty = els.hideEmpty.checked, showClosed = els.showClosed.checked;
    var scoped = ALL.filter(inScope);
    var byStage = {}, unknown = [], shown = 0;
    scoped.forEach(function (idea) {
      if (!passesFilters(idea)) return;
      shown++;
      var st = idea.stage || "";
      if (KNOWN.indexOf(st) >= 0) (byStage[st] = byStage[st] || []).push(idea);
      else unknown.push(idea);
    });

    els.phaseRow.innerHTML = ""; els.board.innerHTML = "";
    var phaseCols = [], phaseSpans = [];

    PHASES.forEach(function (phase) {
      if (phase.name === "Closed" && !showClosed) return;
      var phaseCount = 0, visibleStages = [];
      phase.stages.forEach(function (st) {
        var cards = byStage[st] || [];
        if (hideEmpty && cards.length === 0) return;
        visibleStages.push({ stage: st, cards: cards }); phaseCount += cards.length;
      });
      if (visibleStages.length === 0) return;
      phaseSpans.push({ name: phase.name, tint: phase.tint, span: visibleStages.length, count: phaseCount });
      visibleStages.forEach(function (vs) { phaseCols.push(vs); });
    });

    if (unknown.length) {
      phaseSpans.push({ name: "Other", tint: "#cbd5e1", span: 1, count: unknown.length });
      phaseCols.push({ stage: "Other / unmapped stage", cards: unknown });
    }

    var phaseTemplate = [];
    phaseSpans.forEach(function (ps) {
      var band = el("div", "phase"); band.style.setProperty("--phase-tint", ps.tint);
      band.appendChild(el("span", null, ps.name)); band.appendChild(el("span", "pcount", String(ps.count)));
      band.style.gridColumn = "span " + ps.span; els.phaseRow.appendChild(band);
      phaseTemplate.push("calc(var(--col-w) * " + ps.span + " + 12px * " + (ps.span - 1) + ")");
    });
    els.phaseRow.style.gridTemplateColumns = phaseTemplate.join(" ");

    phaseCols.forEach(function (vs) {
      var col = el("div", "col" + (vs.cards.length === 0 ? " empty" : ""));
      var head = el("div", "col-head");
      head.appendChild(el("span", "name", vs.stage)); head.appendChild(el("span", "count", String(vs.cards.length)));
      col.appendChild(head);
      var body = el("div", "col-body");
      if (vs.cards.length === 0) body.appendChild(el("div", "col-empty-note", "Nothing here"));
      else vs.cards.sort(function (a, b) { return (parseInt(b.priority, 10) || 0) - (parseInt(a.priority, 10) || 0); })
                   .forEach(function (idea) { body.appendChild(buildCard(idea)); });
      col.appendChild(body); els.board.appendChild(col);
    });

    els.total.textContent = shown + " of " + scoped.length + " Broker idea" + (scoped.length === 1 ? "" : "s");

    if (phaseCols.length === 0) {
      var s = el("div", "state"); s.appendChild(el("h2", null, "No Broker Platform ideas to show"));
      s.appendChild(el("p", null, scoped.length === 0 ? "Nothing in scope yet \u2014 or the Product cells don't match the scope pattern." : "Clear the filters or search."));
      s.style.gridColumn = "1 / -1"; els.board.appendChild(s); els.phaseRow.hidden = true;
    } else els.phaseRow.hidden = false;
    els.board.hidden = false;
  }

  function fill(sel, vals) {
    var keep = sel.value; sel.length = 1;
    vals.forEach(function (v) { var o = document.createElement("option"); o.value = v; o.textContent = v; sel.appendChild(o); });
    if (vals.indexOf(keep) >= 0) sel.value = keep;
  }
  function populateFilters() {
    var srcs = {}; ALL.filter(inScope).forEach(function (i) { if (i.source) srcs[i.source] = 1; });
    fill(els.fSource, Object.keys(srcs).sort());
  }
  function setStamp(iso) { var d = iso ? new Date(iso) : new Date(); els.stamp.textContent = "updated " + d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" }); }

  function showError(msg) {
    els.loading.hidden = true; els.phaseRow.hidden = true; els.board.hidden = false; els.board.innerHTML = "";
    var s = el("div", "state error"); s.appendChild(el("h2", null, "Couldn't load the queue"));
    s.appendChild(el("p", null, msg || "The board API didn't respond. Check the Vercel function logs."));
    s.style.gridColumn = "1 / -1"; els.board.appendChild(s);
  }

  function load() {
    els.refresh.disabled = true; els.refresh.textContent = "Loading…";
    fetch(api("/api/board"), { cache: "no-store" })
      .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
      .then(function (res) {
        if (!res.ok || !res.j || res.j.ok === false) throw new Error((res.j && res.j.error) || "HTTP error");
        ALL = res.j.ideas || [];
        els.loading.hidden = true; populateFilters(); setStamp(res.j.updatedAt); render();
      })
      .catch(function (e) { showError(e.message); })
      .finally(function () { els.refresh.disabled = false; els.refresh.textContent = "Refresh"; });
  }

  // ── Submit: run the watcher ──────────────────────────────────────────
  function openSubmit() {
    var scoped = ALL.filter(inScope);
    var pend = scoped.filter(function (i) { return (i.stage || "") === "In Review" && /approve|decline|revise|hold/i.test(i.review || ""); });
    var approved = pend.filter(function (i) { return /approve/i.test(i.review || ""); });
    var revise = pend.filter(function (i) { return /revise/i.test(i.review || ""); });
    var holds = pend.filter(function (i) { return /hold/i.test(i.review || ""); });
    var declines = pend.filter(function (i) { return /decline/i.test(i.review || ""); });

    els.overlay.innerHTML = "";
    var modal = el("div", "modal");
    var head = el("div", "modal-head");
    head.appendChild(el("span", "m-id", "WATCHER"));
    var x = el("button", "m-close", "\u00D7"); x.setAttribute("aria-label", "Close"); x.addEventListener("click", closeModal);
    head.appendChild(x); modal.appendChild(head);

    modal.appendChild(el("h3", null, "Submit to the watcher"));
    modal.appendChild(el("p", "m-sub", "Runs the watcher now. It reads every decision in the queue and acts on it: Approved fires a build, Revise loops back with your feedback, Declined and Hold are logged."));

    if (approved.length) {
      modal.appendChild(warn("blue", "<strong>" + approved.length + " Approved</strong> \u2192 each fires a real autonomous build on the staging branch (spends API credits, commits code). Promotion to production stays separate and manual."));
    }
    var bits = [];
    if (approved.length) bits.push(approved.length + " Approved");
    if (revise.length) bits.push(revise.length + " Revise");
    if (holds.length) bits.push(holds.length + " Hold");
    if (declines.length) bits.push(declines.length + " Declined");
    modal.appendChild(el("p", "m-sub", bits.length
      ? "Waiting at In Review: " + bits.join(" \u00B7 ") + "."
      : "No new decisions waiting at In Review \u2014 running will just advance any in-flight builds."));

    var errLine = el("p", "m-err", "");
    modal.appendChild(errLine);

    var actions = el("div", "m-actions");
    var cancel = el("button", "btn", "Cancel"); cancel.addEventListener("click", closeModal); actions.appendChild(cancel);
    var go = el("button", "btn primary go", "Submit");
    go.addEventListener("click", function () { runSubmit(go, cancel, errLine, modal); });
    actions.appendChild(go);
    modal.appendChild(actions);

    els.overlay.appendChild(modal);
    els.overlay.hidden = false;
    document.addEventListener("keydown", escClose);
    els.overlay.onclick = function (e) { if (e.target === els.overlay) closeModal(); };
  }

  function runSubmit(go, cancel, errLine, modal) {
    go.disabled = true; cancel.disabled = true; go.textContent = "Running\u2026"; errLine.textContent = "";
    fetch(api("/api/submit"), { method: "POST", headers: { "Content-Type": "application/json" }, body: "{}" })
      .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
      .then(function (res) {
        if (!res.ok || !res.j || res.j.ok === false) throw new Error((res.j && res.j.error) || "Watcher run failed");
        showResult(modal, res.j.watcher);
        load(); // refresh the board behind the modal
      })
      .catch(function (e) { go.disabled = false; cancel.disabled = false; go.textContent = "Try again"; errLine.textContent = e.message; });
  }

  function showResult(modal, watcher) {
    modal.innerHTML = "";
    var head = el("div", "modal-head");
    head.appendChild(el("span", "m-id", "WATCHER"));
    var x = el("button", "m-close", "\u00D7"); x.setAttribute("aria-label", "Close"); x.addEventListener("click", closeModal);
    head.appendChild(x); modal.appendChild(head);
    modal.appendChild(el("h3", null, "Watcher ran"));

    var lines = extractLines(watcher);
    if (lines.length) {
      var list = el("div", "opt-list");
      lines.forEach(function (ln) { list.appendChild(el("div", "res-line", ln)); });
      modal.appendChild(list);
    } else {
      var pre = document.createElement("pre"); pre.className = "res-pre";
      pre.textContent = typeof watcher === "string" ? watcher : JSON.stringify(watcher, null, 2);
      modal.appendChild(pre);
    }
    var actions = el("div", "m-actions");
    var done = el("button", "btn primary", "Done"); done.addEventListener("click", closeModal); actions.appendChild(done);
    modal.appendChild(actions);
  }

  function extractLines(w) {
    if (Array.isArray(w)) return w.map(lineOf);
    if (w && typeof w === "object") {
      var keys = ["results", "actions", "log", "lines", "processed", "messages"];
      for (var k = 0; k < keys.length; k++) { if (Array.isArray(w[keys[k]])) return w[keys[k]].map(lineOf); }
    }
    return [];
  }
  function lineOf(x) {
    if (typeof x === "string") return x;
    if (x && typeof x === "object") { if (x.id && x.action) return x.id + ": " + x.action; return JSON.stringify(x); }
    return String(x);
  }

  // ── New idea (intake) ────────────────────────────────────────────────
  var PRODUCTS = ["Broker Platform", "Roofing Proposals", "United Transportation"];

  function intakeShell() {
    els.overlay.innerHTML = "";
    var modal = el("div", "modal");
    var head = el("div", "modal-head");
    head.appendChild(el("span", "m-id", "NEW IDEA"));
    var x = el("button", "m-close", "\u00D7"); x.setAttribute("aria-label", "Close"); x.addEventListener("click", closeModal);
    head.appendChild(x); modal.appendChild(head);
    els.overlay.appendChild(modal);
    els.overlay.hidden = false;
    document.addEventListener("keydown", escClose);
    els.overlay.onclick = function (e) { if (e.target === els.overlay) closeModal(); };
    return modal;
  }

  function openIntake() { renderCompose(""); }

  function renderCompose(prefill) {
    var m = intakeShell();
    m.appendChild(el("h3", null, "Add an idea"));
    m.appendChild(el("p", "m-sub", "Paste or describe an idea \u2014 a thin seed or a full spec. Intake enriches it, you confirm, and it lands at Captured."));
    var field = el("div", "field");
    var ta = document.createElement("textarea");
    ta.placeholder = "e.g. \u201Cshow dates on old timestamps\u201D \u2014 or paste a full build spec";
    ta.value = prefill || "";
    field.appendChild(ta);
    m.appendChild(field);
    var errLine = el("p", "m-err", ""); m.appendChild(errLine);
    var actions = el("div", "m-actions");
    var cancel = el("button", "btn", "Cancel"); cancel.addEventListener("click", closeModal); actions.appendChild(cancel);
    var go = el("button", "btn primary", "Enrich \u2192");
    go.addEventListener("click", function () {
      var text = ta.value.trim();
      if (!text) { errLine.textContent = "Paste an idea first."; return; }
      runEnrich(text, go, errLine);
    });
    actions.appendChild(go);
    m.appendChild(actions);
    ta.focus();
  }

  function runEnrich(text, go, errLine) {
    go.disabled = true; go.textContent = "Enriching\u2026"; errLine.textContent = "";
    fetch(api("/api/intake"), { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ text: text }) })
      .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
      .then(function (res) {
        if (!res.ok || !res.j || res.j.ok === false) throw new Error((res.j && res.j.error) || "Enrich failed");
        renderDraft(text, res.j.draft);
      })
      .catch(function (e) { go.disabled = false; go.textContent = "Try again"; errLine.textContent = e.message; });
  }

  function renderDraft(text, draft) {
    var m = intakeShell();
    m.appendChild(el("h3", null, "Review before adding"));
    m.appendChild(el("span", "baked-badge " + (draft.baked ? "yes" : "no"),
      draft.baked ? "\u2713 Includes a build sequence \u2014 design will refine it, not rewrite"
                  : "Thin seed \u2014 design will generate the spec"));

    var fTitle = el("div", "field"); fTitle.appendChild(el("label", null, "Title"));
    var inTitle = document.createElement("input"); inTitle.value = draft.title || ""; fTitle.appendChild(inTitle); m.appendChild(fTitle);

    var fRow = el("div", "field row2");
    var dProd = document.createElement("div"); dProd.appendChild(el("label", null, "Product"));
    var selProd = document.createElement("select");
    PRODUCTS.forEach(function (p) { var o = document.createElement("option"); o.value = p; o.textContent = p; if (p === draft.product) o.selected = true; selProd.appendChild(o); });
    dProd.appendChild(selProd); fRow.appendChild(dProd);
    var dPri = document.createElement("div"); dPri.appendChild(el("label", null, "Priority"));
    var inPri = document.createElement("input"); inPri.type = "number"; inPri.min = "0"; inPri.max = "100"; inPri.value = String(draft.priorityScore || 60); dPri.appendChild(inPri); fRow.appendChild(dPri);
    m.appendChild(fRow);

    var previewText = [draft.reasoning,
      draft.aiNativeApproach ? ("AI-native: " + draft.aiNativeApproach) : "",
      draft.openQuestions ? ("Open questions: " + draft.openQuestions) : ""].filter(Boolean).join("\n\n");
    if (previewText) { var prev = el("div", "preview", previewText); m.appendChild(prev); }

    var errLine = el("p", "m-err", ""); m.appendChild(errLine);
    var actions = el("div", "m-actions");
    var back = el("button", "btn", "Back"); back.addEventListener("click", function () { renderCompose(text); }); actions.appendChild(back);
    var go = el("button", "btn primary go", "Add to Captured");
    go.addEventListener("click", function () {
      var edited = {};
      for (var k in draft) edited[k] = draft[k];
      edited.title = inTitle.value.trim();
      edited.product = selProd.value;
      edited.priorityScore = Number(inPri.value) || 60;
      runConfirm(text, edited, go, errLine);
    });
    actions.appendChild(go);
    m.appendChild(actions);
  }

  function runConfirm(text, draft, go, errLine) {
    go.disabled = true; go.textContent = "Adding\u2026"; errLine.textContent = "";
    fetch(api("/api/intake"), { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ text: text, confirm: true, draft: draft }) })
      .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
      .then(function (res) {
        if (!res.ok || !res.j || res.j.ok === false) throw new Error((res.j && res.j.error) || "Add failed");
        closeModal();
        load();
        showToast(res.j.ideaId + " added to Captured \u00B7 " + res.j.product);
      })
      .catch(function (e) { go.disabled = false; go.textContent = "Try again"; errLine.textContent = e.message; });
  }

  // ── Promote (staging -> main -> production) ──────────────────────────
  function openPromoteConfirm(idea) {
    var m = shell(idea);
    m.appendChild(el("h3", null, "Promote " + idea.id + " to production?"));
    m.appendChild(el("p", "m-sub", idea.title || ""));
    m.appendChild(warn("red", "<strong>This merges staging \u2192 main and deploys to PRODUCTION.</strong> Read the diff before confirming \u2014 this is the live system."));

    var diff = el("div", "m-warn blue");
    var a = document.createElement("a");
    a.href = "https://github.com/workanewway/vetting-platform-api/compare/main...staging";
    a.target = "_blank"; a.rel = "noopener"; a.textContent = "Open the staging \u2192 main diff \u2197";
    a.style.color = "#245a8a"; a.style.fontWeight = "700"; a.style.textDecoration = "none";
    diff.appendChild(a);
    m.appendChild(diff);

    m.appendChild(warn("amber", "Ships <strong>code only</strong>. If this build added a DB migration (supabase/), run it on prod Supabase after promoting \u2014 Promote does not run migrations."));

    var errLine = el("p", "m-err", ""); m.appendChild(errLine);
    var actions = el("div", "m-actions");
    var cancel = el("button", "btn", "Cancel"); cancel.addEventListener("click", closeModal); actions.appendChild(cancel);
    var go = el("button", "btn primary go", "Promote to production");
    go.addEventListener("click", function () { runPromote(idea.id, go, errLine); });
    actions.appendChild(go);
    m.appendChild(actions);
  }

  function runPromote(id, go, errLine) {
    go.disabled = true; go.textContent = "Promoting\u2026"; errLine.textContent = "";
    fetch(api("/api/promote?id=" + encodeURIComponent(id)), { method: "POST", headers: { "Content-Type": "application/json" }, body: "{}" })
      .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
      .then(function (res) {
        if (!res.ok || !res.j || res.j.ok === false) throw new Error((res.j && res.j.error) || "Promote failed");
        closeModal(); load();
        showToast(id + (res.j.merged ? " promoted \u2192 production deploying" : " \u2014 main already up to date") + (res.j.warning ? " (" + res.j.warning + ")" : ""));
      })
      .catch(function (e) { go.disabled = false; go.textContent = "Try again"; errLine.textContent = e.message; });
  }

  els.search.addEventListener("input", render);
  [els.fSource, els.hideEmpty, els.showClosed].forEach(function (n) { n.addEventListener("change", render); });
  els.refresh.addEventListener("click", load);
  els.submit.addEventListener("click", openSubmit);
  els.newIdea.addEventListener("click", openIntake);
  els.runDesign.addEventListener("click", openRunDesign);

  load();
})();
</script>
</body>
</html>
