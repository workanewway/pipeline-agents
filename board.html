<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pipeline Board</title>
<style>
  :root {
    --bg: #f5f7fa;
    --panel: #eef1f6;
    --card: #ffffff;
    --ink: #1b2533;
    --ink-soft: #5b6878;
    --ink-faint: #8794a6;
    --line: #dde3ec;
    --line-soft: #e7ecf3;
    --nwd: #305d94;
    --action: #3182ce;
    --orange: #ed8936;
    --green: #48bb78;
    --amber: #d69e2e;
    --red: #e53e3e;
    --slate: #64748b;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --sans: -apple-system, system-ui, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --col-w: 248px;
    --radius: 10px;
    --shadow: 0 1px 2px rgba(20,33,51,.06), 0 1px 1px rgba(20,33,51,.04);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: var(--sans);
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
  }

  /* ── Top bar ───────────────────────────────────────────── */
  header.bar {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 12px 20px;
    background: #fff;
    border-bottom: 1px solid var(--line);
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 20;
  }
  .brand { display: flex; align-items: baseline; gap: 10px; }
  .brand .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--green); align-self: center;
    box-shadow: 0 0 0 3px rgba(72,187,120,.18);
  }
  .brand h1 {
    font-size: 16px; font-weight: 650; letter-spacing: -.01em; margin: 0;
  }
  .brand .sub { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); }

  .controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-left: auto; }
  .controls input[type="search"],
  .controls select {
    font-family: var(--sans);
    font-size: 13px;
    color: var(--ink);
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 6px 10px;
    height: 32px;
  }
  .controls input[type="search"] { width: 180px; }
  .controls select { cursor: pointer; }
  .controls input:focus-visible,
  .controls select:focus-visible,
  button:focus-visible,
  .card:focus-visible {
    outline: 2px solid var(--action);
    outline-offset: 2px;
  }
  .toggle {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--ink-soft); cursor: pointer; user-select: none;
    padding: 4px 6px; border-radius: 6px;
  }
  .toggle input { accent-color: var(--action); }
  button.refresh {
    font-family: var(--sans); font-size: 13px; font-weight: 550;
    color: #fff; background: var(--nwd);
    border: 0; border-radius: 8px; height: 32px; padding: 0 14px; cursor: pointer;
  }
  button.refresh:hover { background: #284f7e; }
  button.refresh:disabled { opacity: .55; cursor: default; }
  .stamp { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); white-space: nowrap; }

  /* ── Board ─────────────────────────────────────────────── */
  .scroll { flex: 1; overflow: auto; padding: 0 14px 18px; }
  .phase-row, .board { display: grid; grid-auto-flow: column; gap: 12px; }
  .phase-row {
    position: sticky; top: 0; z-index: 5;
    padding: 12px 0 6px; background: var(--bg);
  }
  .board { padding-bottom: 6px; align-items: start; grid-auto-columns: var(--col-w); }

  .phase {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; font-weight: 650; letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink-soft);
    padding: 4px 2px;
    border-top: 2px solid var(--phase-tint, var(--slate));
  }
  .phase .pcount { font-family: var(--mono); font-weight: 600; color: var(--ink-faint); letter-spacing: 0; }

  .col {
    width: var(--col-w);
    background: var(--panel);
    border: 1px solid var(--line-soft);
    border-radius: var(--radius);
    display: flex; flex-direction: column;
    max-height: 100%;
  }
  .col.empty { background: transparent; border-style: dashed; border-color: var(--line); }
  .col-head {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 11px;
    border-bottom: 1px solid var(--line-soft);
    position: sticky; top: 0; background: inherit; border-radius: var(--radius) var(--radius) 0 0;
  }
  .col.empty .col-head { border-bottom-color: transparent; }
  .col-head .name { font-size: 12.5px; font-weight: 600; color: var(--ink); letter-spacing: -.01em; }
  .col-head .count {
    font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--ink-soft);
    background: #fff; border: 1px solid var(--line); border-radius: 20px;
    min-width: 20px; height: 20px; padding: 0 6px;
    display: inline-flex; align-items: center; justify-content: center; margin-left: auto;
  }
  .col-body { padding: 8px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
  .col-empty-note { font-size: 11.5px; color: var(--ink-faint); padding: 10px 4px; text-align: center; }

  /* ── Card ──────────────────────────────────────────────── */
  .card {
    display: block; text-align: left; width: 100%;
    background: var(--card);
    border: 1px solid var(--line);
    border-left: 3px solid var(--spine, var(--slate));
    border-radius: 8px;
    padding: 9px 10px 10px;
    cursor: pointer;
    box-shadow: var(--shadow);
    font-family: var(--sans);
    transition: border-color .12s ease, transform .12s ease, box-shadow .12s ease;
  }
  .card:hover { border-color: var(--action); border-left-color: var(--spine, var(--slate)); transform: translateY(-1px); box-shadow: 0 4px 10px rgba(20,33,51,.10); }
  .card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .card-id { font-family: var(--mono); font-size: 10.5px; font-weight: 600; color: var(--ink-faint); letter-spacing: .02em; }
  .pri {
    margin-left: auto; font-family: var(--mono); font-size: 10.5px; font-weight: 600;
    color: var(--ink-soft); display: inline-flex; align-items: center; gap: 5px;
  }
  .pri .bar { width: 30px; height: 4px; border-radius: 3px; background: var(--line); overflow: hidden; }
  .pri .bar > i { display: block; height: 100%; background: var(--action); }
  .card-title { font-size: 13px; font-weight: 600; line-height: 1.3; color: var(--ink); margin: 0 0 5px; }
  .card-reason {
    font-size: 11.5px; line-height: 1.4; color: var(--ink-soft); margin: 0 0 8px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .badges { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
  .badge {
    font-size: 10px; font-weight: 600; letter-spacing: .01em;
    padding: 2px 7px; border-radius: 20px; white-space: nowrap;
  }
  .badge.source { background: #eef2f8; color: var(--ink-soft); }
  .badge.product { background: var(--prod-bg, #eef2f8); color: var(--prod-ink, var(--ink-soft)); }
  .pill {
    font-size: 10px; font-weight: 650; letter-spacing: .02em; text-transform: uppercase;
    padding: 2px 8px; border-radius: 20px; white-space: nowrap;
  }
  .pill.approved { background: rgba(72,187,120,.15); color: #277a4b; }
  .pill.declined { background: rgba(229,62,62,.13); color: #b23030; }
  .pill.hold { background: #e9edf3; color: var(--slate); }
  .pill.revise { background: rgba(214,158,46,.16); color: #9a6f12; }
  .pill.pending { background: #fff; color: var(--action); border: 1px solid rgba(49,130,206,.4); }
  .meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 7px; align-items: center; }
  .chip { font-family: var(--mono); font-size: 10px; color: var(--ink-faint); display: inline-flex; align-items: center; gap: 3px; }
  .chip.warn { color: var(--amber); }
  .chip a, .meta a { color: var(--action); text-decoration: none; font-family: var(--mono); font-size: 10px; }
  .chip a:hover, .meta a:hover { text-decoration: underline; }
  .blocked-note { margin-top: 7px; font-size: 10.5px; color: #b23030; background: rgba(229,62,62,.07); border-radius: 6px; padding: 5px 7px; line-height: 1.35; }

  /* ── States ────────────────────────────────────────────── */
  .state { padding: 60px 20px; text-align: center; color: var(--ink-soft); }
  .state h2 { font-size: 15px; font-weight: 600; color: var(--ink); margin: 0 0 6px; }
  .state p { font-size: 13px; margin: 0; }
  .state.error h2 { color: var(--red); }
  .spinner { width: 22px; height: 22px; border: 2.5px solid var(--line); border-top-color: var(--action); border-radius: 50%; margin: 0 auto 14px; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) { .spinner { animation: none; } .card { transition: none; } }

  @media (max-width: 640px) {
    .controls input[type="search"] { width: 130px; }
    .stamp { width: 100%; }
  }
</style>
</head>
<body>
  <header class="bar">
    <div class="brand">
      <span class="dot" id="liveDot" title="Read-only view"></span>
      <h1>Pipeline Board</h1>
      <span class="sub" id="totalCount">—</span>
    </div>
    <div class="controls">
      <input type="search" id="search" placeholder="Search title or reasoning…" aria-label="Search ideas" />
      <select id="fProduct" aria-label="Filter by product"><option value="">All products</option></select>
      <select id="fSource" aria-label="Filter by source"><option value="">All sources</option></select>
      <label class="toggle"><input type="checkbox" id="hideEmpty" /> Hide empty</label>
      <label class="toggle"><input type="checkbox" id="showClosed" checked /> Show closed</label>
      <span class="stamp" id="stamp"></span>
      <button class="refresh" id="refresh">Refresh</button>
    </div>
  </header>

  <div class="scroll" id="scroll">
    <div class="state" id="loading"><div class="spinner"></div><p>Loading the queue…</p></div>
    <div class="phase-row" id="phaseRow" hidden></div>
    <div class="board" id="board" hidden></div>
  </div>

<script>
(function () {
  "use strict";

  // Carry an optional ?key= through to the API and into resolve.html links,
  // so a gated board keeps working end to end.
  var KEY = new URLSearchParams(location.search).get("key") || "";

  var PHASES = [
    { name: "Intake", tint: "#64748b", stages: ["Captured", "Enriching"] },
    { name: "Design", tint: "#3182ce", stages: ["Designing", "In Review"] },
    { name: "Build",  tint: "#ed8936", stages: ["Approved", "Building", "Testing", "Preview Deployed"] },
    { name: "Ship",   tint: "#48bb78", stages: ["Ready to Promote", "Live", "Monitoring"] },
    { name: "Closed", tint: "#94a3b8", stages: ["Declined", "Blocked"] }
  ];
  var KNOWN = PHASES.reduce(function (a, p) { return a.concat(p.stages); }, []);

  var els = {
    board: document.getElementById("board"),
    phaseRow: document.getElementById("phaseRow"),
    loading: document.getElementById("loading"),
    search: document.getElementById("search"),
    fProduct: document.getElementById("fProduct"),
    fSource: document.getElementById("fSource"),
    hideEmpty: document.getElementById("hideEmpty"),
    showClosed: document.getElementById("showClosed"),
    refresh: document.getElementById("refresh"),
    stamp: document.getElementById("stamp"),
    total: document.getElementById("totalCount"),
    scroll: document.getElementById("scroll")
  };

  var ALL = [];

  function api(path) { return path + (KEY ? (path.indexOf("?") < 0 ? "?" : "&") + "key=" + encodeURIComponent(KEY) : ""); }
  function resolveLink(id) { return "resolve.html?id=" + encodeURIComponent(id) + (KEY ? "&key=" + encodeURIComponent(KEY) : ""); }

  function productStyle(p) {
    var s = (p || "").toLowerCase();
    if (s.indexOf("vetting") >= 0 || s.indexOf("broker") >= 0 || s.indexOf("carrier") >= 0) return { spine: "#305d94", bg: "#e7eef6", ink: "#2a4d77" };
    if (s.indexOf("roof") >= 0) return { spine: "#ed8936", bg: "#fdeede", ink: "#9c5715" };
    if (s.indexOf("united") >= 0 || s.indexOf("dispatch") >= 0 || s.indexOf("transport") >= 0) return { spine: "#0d9488", bg: "#dcf3f0", ink: "#0a6b62" };
    return { spine: "#94a3b8", bg: "#eef2f8", ink: "#5b6878" };
  }

  function reviewPill(v) {
    var s = (v || "").toLowerCase();
    if (s.indexOf("approve") >= 0) return { cls: "approved", txt: "Approved" };
    if (s.indexOf("decline") >= 0) return { cls: "declined", txt: "Declined" };
    if (s.indexOf("revise") >= 0) return { cls: "revise", txt: v };
    if (s.indexOf("hold") >= 0) return { cls: "hold", txt: "Hold" };
    if (s === "" ) return null;
    return { cls: "pending", txt: v };
  }

  function el(tag, cls, text) {
    var n = document.createElement(tag);
    if (cls) n.className = cls;
    if (text != null) n.textContent = text;
    return n;
  }

  function buildCard(idea) {
    var prod = productStyle(idea.product);
    var card = el("a", "card");
    card.href = resolveLink(idea.id);
    card.style.setProperty("--spine", prod.spine);

    var top = el("div", "card-top");
    top.appendChild(el("span", "card-id", idea.id || "—"));
    var pNum = parseInt(idea.priority, 10);
    if (!isNaN(pNum)) {
      var pri = el("span", "pri");
      pri.appendChild(el("span", null, String(pNum)));
      var bar = el("span", "bar");
      var fill = document.createElement("i");
      fill.style.width = Math.max(0, Math.min(100, pNum)) + "%";
      bar.appendChild(fill);
      pri.appendChild(bar);
      top.appendChild(pri);
    }
    card.appendChild(top);

    card.appendChild(el("p", "card-title", idea.title || "(untitled)"));
    if (idea.reasoning) card.appendChild(el("p", "card-reason", idea.reasoning));

    var badges = el("div", "badges");
    var rp = reviewPill(idea.review);
    if (rp) { var pill = el("span", "pill " + rp.cls, rp.txt); badges.appendChild(pill); }
    if (idea.product) {
      var pb = el("span", "badge product", idea.product);
      pb.style.setProperty("--prod-bg", prod.bg);
      pb.style.setProperty("--prod-ink", prod.ink);
      badges.appendChild(pb);
    }
    if (idea.source) badges.appendChild(el("span", "badge source", idea.source));
    if (badges.childNodes.length) card.appendChild(badges);

    var meta = el("div", "meta");
    var revs = parseInt(idea.revisions, 10);
    if (!isNaN(revs) && revs > 0) meta.appendChild(el("span", "chip warn", "\u21BB " + revs + " revision" + (revs === 1 ? "" : "s")));
    if (idea.previewUrl) {
      var pv = el("span", "chip");
      var a = document.createElement("a");
      a.href = idea.previewUrl; a.target = "_blank"; a.rel = "noopener";
      a.textContent = "Preview \u2197";
      a.addEventListener("click", function (e) { e.stopPropagation(); });
      pv.appendChild(a);
      meta.appendChild(pv);
    }
    if (idea.prodUrl) {
      var lv = el("span", "chip");
      var a2 = document.createElement("a");
      a2.href = idea.prodUrl; a2.target = "_blank"; a2.rel = "noopener";
      a2.textContent = "Live \u2197";
      a2.addEventListener("click", function (e) { e.stopPropagation(); });
      lv.appendChild(a2);
      meta.appendChild(lv);
    }
    if (meta.childNodes.length) card.appendChild(meta);

    if (idea.blockedReason) card.appendChild(el("div", "blocked-note", "Blocked: " + idea.blockedReason));

    return card;
  }

  function passesFilters(idea) {
    var q = els.search.value.trim().toLowerCase();
    if (q) {
      var hay = ((idea.title || "") + " " + (idea.reasoning || "") + " " + (idea.id || "")).toLowerCase();
      if (hay.indexOf(q) < 0) return false;
    }
    if (els.fProduct.value && idea.product !== els.fProduct.value) return false;
    if (els.fSource.value && idea.source !== els.fSource.value) return false;
    return true;
  }

  function render() {
    var hideEmpty = els.hideEmpty.checked;
    var showClosed = els.showClosed.checked;

    // group by stage
    var byStage = {};
    var unknown = [];
    var shown = 0;
    ALL.forEach(function (idea) {
      if (!passesFilters(idea)) return;
      shown++;
      var st = idea.stage || "";
      if (KNOWN.indexOf(st) >= 0) { (byStage[st] = byStage[st] || []).push(idea); }
      else unknown.push(idea);
    });

    els.phaseRow.innerHTML = "";
    els.board.innerHTML = "";

    var phaseCols = [];
    var phaseSpans = [];

    PHASES.forEach(function (phase) {
      if (phase.name === "Closed" && !showClosed) return;
      var stages = phase.stages.slice();
      var phaseCount = 0;
      var visibleStages = [];

      stages.forEach(function (st) {
        var cards = byStage[st] || [];
        if (hideEmpty && cards.length === 0) return;
        visibleStages.push({ stage: st, cards: cards });
        phaseCount += cards.length;
      });
      if (visibleStages.length === 0) return;

      phaseSpans.push({ name: phase.name, tint: phase.tint, span: visibleStages.length, count: phaseCount });
      visibleStages.forEach(function (vs) { phaseCols.push(vs); });
    });

    if (unknown.length) {
      phaseSpans.push({ name: "Other", tint: "#cbd5e1", span: 1, count: unknown.length });
      phaseCols.push({ stage: "Other / unmapped stage", cards: unknown });
    }

    // phase band row — each phase header spans its visible stage columns
    var phaseTemplate = [];
    phaseSpans.forEach(function (ps) {
      var band = el("div", "phase");
      band.style.setProperty("--phase-tint", ps.tint);
      band.appendChild(el("span", null, ps.name));
      band.appendChild(el("span", "pcount", String(ps.count)));
      band.style.gridColumn = "span " + ps.span;
      els.phaseRow.appendChild(band);
      phaseTemplate.push("calc(var(--col-w) * " + ps.span + " + 12px * " + (ps.span - 1) + ")");
    });
    els.phaseRow.style.gridTemplateColumns = phaseTemplate.join(" ");

    // columns
    phaseCols.forEach(function (vs) {
      var col = el("div", "col" + (vs.cards.length === 0 ? " empty" : ""));
      var head = el("div", "col-head");
      head.appendChild(el("span", "name", vs.stage));
      head.appendChild(el("span", "count", String(vs.cards.length)));
      col.appendChild(head);
      var body = el("div", "col-body");
      if (vs.cards.length === 0) {
        body.appendChild(el("div", "col-empty-note", "Nothing here"));
      } else {
        vs.cards
          .sort(function (a, b) { return (parseInt(b.priority, 10) || 0) - (parseInt(a.priority, 10) || 0); })
          .forEach(function (idea) { body.appendChild(buildCard(idea)); });
      }
      col.appendChild(body);
      els.board.appendChild(col);
    });

    els.total.textContent = shown + (shown === ALL.length ? "" : " / " + ALL.length) + " idea" + (ALL.length === 1 ? "" : "s");

    if (phaseCols.length === 0) {
      els.board.appendChild(emptyState());
      els.phaseRow.hidden = true;
    } else {
      els.phaseRow.hidden = false;
    }
    els.board.hidden = false;
  }

  function emptyState() {
    var s = el("div", "state");
    s.appendChild(el("h2", null, "No ideas match"));
    s.appendChild(el("p", null, "Clear the filters or search to see the full queue."));
    s.style.gridColumn = "1 / -1";
    return s;
  }

  function populateFilters() {
    var prods = {}, srcs = {};
    ALL.forEach(function (i) { if (i.product) prods[i.product] = 1; if (i.source) srcs[i.source] = 1; });
    fill(els.fProduct, Object.keys(prods).sort());
    fill(els.fSource, Object.keys(srcs).sort());
  }
  function fill(sel, vals) {
    var keep = sel.value;
    sel.length = 1;
    vals.forEach(function (v) { var o = document.createElement("option"); o.value = v; o.textContent = v; sel.appendChild(o); });
    if (vals.indexOf(keep) >= 0) sel.value = keep;
  }

  function setStamp(iso) {
    var d = iso ? new Date(iso) : new Date();
    els.stamp.textContent = "updated " + d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  }

  function showError(msg) {
    els.loading.hidden = true;
    els.phaseRow.hidden = true;
    els.board.hidden = false;
    els.board.innerHTML = "";
    var s = el("div", "state error");
    s.appendChild(el("h2", null, "Couldn't load the queue"));
    s.appendChild(el("p", null, msg || "The board API didn't respond. Check the Vercel function logs."));
    s.style.gridColumn = "1 / -1";
    els.board.appendChild(s);
  }

  function load() {
    els.refresh.disabled = true;
    els.refresh.textContent = "Loading…";
    fetch(api("/api/board"), { cache: "no-store" })
      .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
      .then(function (res) {
        if (!res.ok || !res.j || res.j.ok === false) throw new Error((res.j && res.j.error) || ("HTTP " + (res.j && res.j.status)));
        ALL = (res.j.ideas || []);
        els.loading.hidden = true;
        populateFilters();
        setStamp(res.j.updatedAt);
        render();
      })
      .catch(function (e) { showError(e.message); })
      .finally(function () { els.refresh.disabled = false; els.refresh.textContent = "Refresh"; });
  }

  // events
  ["input", "change"].forEach(function (ev) {
    els.search.addEventListener(ev, render);
  });
  [els.fProduct, els.fSource, els.hideEmpty, els.showClosed].forEach(function (n) {
    n.addEventListener("change", render);
  });
  els.refresh.addEventListener("click", load);

  load();
})();
</script>
</body>
</html>
